<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 背景深蓝渐变 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B4B"/>
      <stop offset="100%" stop-color="#162660"/>
    </linearGradient>
    <!-- 盾牌青蓝渐变 -->
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
    <!-- 盾牌高光 -->
    <linearGradient id="shieldHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 软阴影 -->
    <filter id="shadow" x="-10%" y="-5%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 圆角正方形背景 -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>

  <!-- 背景装饰圆圈（淡） -->
  <circle cx="512" cy="512" r="380" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.06"/>
  <circle cx="512" cy="512" r="300" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>

  <!-- 盾牌主体 -->
  <path d="M512,155
           L778,268
           L778,510
           Q778,710 512,865
           Q246,710 246,510
           L246,268
           Z"
        fill="url(#shieldGrad)"
        filter="url(#shadow)"/>

  <!-- 盾牌高光层（上半部分白色渐变） -->
  <path d="M512,155
           L778,268
           L778,510
           Q778,710 512,865
           Q246,710 246,510
           L246,268
           Z"
        fill="url(#shieldHighlight)"/>

  <!-- 盾牌内边框（细描边增加层次） -->
  <path d="M512,195
           L748,296
           L748,510
           Q748,688 512,828
           Q276,688 276,510
           L276,296
           Z"
        fill="none"
        stroke="white"
        stroke-width="3"
        stroke-opacity="0.18"/>

  <!-- 锁扣（弧形） -->
  <path d="M408,452 L408,388 Q408,306 512,306 Q616,306 616,388 L616,452"
        stroke="white"
        stroke-width="58"
        stroke-linecap="round"
        fill="none"
        filter="url(#glow)"/>

  <!-- 锁身 -->
  <rect x="372" y="445" width="280" height="218" rx="38" fill="white" filter="url(#glow)"/>

  <!-- 锁孔圆 -->
  <circle cx="512" cy="544" r="42" fill="#0288D1"/>

  <!-- 锁孔槽 -->
  <rect x="490" y="572" width="44" height="58" rx="14" fill="#0288D1"/>

  <!-- 右下角时钟小标（代表 TOTP 时间性） -->
  <circle cx="730" cy="750" r="88" fill="#0D1B4B" stroke="#4FC3F7" stroke-width="10"/>
  <line x1="730" y1="750" x2="730" y2="702" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <line x1="730" y1="750" x2="762" y2="768" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <!-- 小时钟刻度 -->
  <line x1="730" y1="666" x2="730" y2="676" stroke="#4FC3F7" stroke-width="7" stroke-linecap="round"/>
  <line x1="730" y1="824" x2="730" y2="834" stroke="#4FC3F7" stroke-width="7" stroke-linecap="round"/>
  <line x1="642" y1="750" x2="652" y2="750" stroke="#4FC3F7" stroke-width="7" stroke-linecap="round"/>
  <line x1="808" y1="750" x2="818" y2="750" stroke="#4FC3F7" stroke-width="7" stroke-linecap="round"/>
</svg>
