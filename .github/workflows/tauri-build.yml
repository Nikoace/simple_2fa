name: Build Tauri

on:
  push:
    branches: [feature/tauri-desktop, main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend_react/src-tauri

      - name: Run Rust tests
        working-directory: frontend_react/src-tauri
        run: cargo test

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend_react/bun.lockb', 'frontend_react/bun.lock') }}

      - name: Install frontend dependencies
        working-directory: frontend_react
        run: bun install

      - name: Run frontend tests
        working-directory: frontend_react
        run: bunx vitest run

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend_react/src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend_react/bun.lockb', 'frontend_react/bun.lock') }}

      - name: Install frontend dependencies
        working-directory: frontend_react
        run: bun install

      - name: Build Tauri (Linux)
        working-directory: frontend_react
        run: bunx tauri build

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simple-2fa-linux
          path: frontend_react/src-tauri/target/release/bundle/**/*

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend_react/src-tauri

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend_react/bun.lockb', 'frontend_react/bun.lock') }}

      - name: Install frontend dependencies
        working-directory: frontend_react
        run: bun install

      - name: Build Tauri (Windows)
        working-directory: frontend_react
        run: bunx tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: simple-2fa-windows
          path: frontend_react/src-tauri/target/release/bundle/**/*
